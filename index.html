  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'PP Editorial New';
      src: url('PPEditorialNew-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-hover: #1a1a1a;
      --surface-border: #222222;
      --text: #ebe5df;
      --text-muted: #9b9690;
      --text-dim: #555250;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Manrope', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    ::selection {
      background: rgba(235, 229, 223, 0.2);
      color: #fff;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .top-bar .location,
    .top-bar .time {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .top-bar svg {
      width: 12px;
      height: 12px;
      opacity: 0.5;
    }

    .hub {
      max-width: 440px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
      text-align: center;
    }

    .profile-photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 1.5rem;
      border: 2px solid var(--surface-border);
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* FONT TEST: Instrument Serif Italic */
    .name {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 400;
      font-style: italic;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    .tagline {
      font-size: 0.85rem;
      color: #ffffff;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    /* ---- Socials (handles + color icons) ---- */
    .socials {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      color: var(--text-dim);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .socials a:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--text-dim);
    }

    .socials a svg {
      width: 16px;
      height: 16px;
    }

    /* ---- Cards ---- */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 14px;
      padding: 0.9rem 1.15rem;
      text-decoration: none;
      color: var(--text);
      text-align: left;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: var(--text-dim);
      transform: translateY(-1px);
    }

    .card-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .card-icon svg { width: 18px; height: 18px; }

    .card-text { flex: 1; min-width: 0; }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
      line-height: 1.4;
    }

    .card-arrow {
      color: var(--text-dim);
      flex-shrink: 0;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .card:hover .card-arrow {
      transform: translateX(2px);
      color: var(--text-muted);
    }

    .card-icon.contact {
      background: #111418;
      color: #7c9cc8;
    }

    /* ---- Easter Egg ---- */
    .easter-egg {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
      cursor: pointer;
      opacity: 0.04;
      transition: opacity 0.4s ease;
      z-index: 100;
    }

    .easter-egg:hover { opacity: 0.3; }

    .easter-egg svg { width: 100%; height: 100%; color: var(--text); }

    .game-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .game-overlay.active { opacity: 1; pointer-events: all; }

    .game-overlay .close-game {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: none; border: none;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .game-overlay .close-game:hover { color: var(--text); }

    .game-overlay canvas {
      border: 2px solid var(--surface-border);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .game-overlay .game-info {
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    .game-overlay .game-title {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    footer {
      text-align: center;
      padding: 2.5rem 0 2rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hub > * { animation: fadeUp 0.6s ease both; }
    .profile-photo { animation-delay: 0.05s; }
    .name { animation-delay: 0.1s; }
    .tagline { animation-delay: 0.15s; }
    .socials { animation-delay: 0.2s; }
    .cards { animation-delay: 0.25s; }
    .cards .card:nth-child(1) { animation: fadeUp 0.5s ease 0.3s both; }
    .cards .card:nth-child(2) { animation: fadeUp 0.5s ease 0.35s both; }
  </style>
</head>
